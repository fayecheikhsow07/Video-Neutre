version: '3.8'

services:
  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-neutre-api
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/video_neutre
      - REDIS_URL=redis://redis:6379
      - MINIO_URL=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
    depends_on:
      - db
      - redis
      - minio
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - video-neutre-net

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-neutre-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - video-neutre-net

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: video-neutre-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_neutre
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - video-neutre-net

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: video-neutre-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - video-neutre-net

  # MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio:latest
    container_name: video-neutre-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - video-neutre-net

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  video-neutre-net:
    driver: bridge
